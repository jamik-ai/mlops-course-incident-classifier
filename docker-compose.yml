version: '3.8'

services:
  backend:
    build: .
    container_name: call_forecast_backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=development
    volumes:
      - ./src:/app/src
      - ./models:/app/models
    restart: unless-stopped
    networks:
      - forecast_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: call_forecast_frontend
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - forecast_network
    depends_on:
      - backend

networks:
  forecast_network:
    driver: bridge