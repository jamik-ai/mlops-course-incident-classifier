# This workflow executes several linters on changed files based on languages used in your code base whenever
# you push a code or open a pull request.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/github/super-linter
name: Lint & Build
on:
  pull_request:
    branches: [ main ]   # запуск при MR в main
  push:
    branches: [ main ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check .

  lint-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ESLint
        run: npm install -g eslint@8
      - name: Run ESLint
        run: eslint ./src/api/frontend --ext .js,.jsx,.mjs,.cjs

  build:
    runs-on: ubuntu-latest
    needs: [lint-python, lint-js]   # билдим только если линтеры прошли
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: |
          docker build -t backend:ci .
          docker build -f Dockerfile.frontend -t frontend:ci .